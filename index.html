<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StockFlow — Inventory Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAFA; color: #111827; -webkit-font-smoothing: antialiased; }
  :root {
    --white: #FFFFFF; --bg: #FAFAFA; --surface: #F5F5F5;
    --border: #E5E7EB; --border2: #D1D5DB;
    --text: #111827; --muted: #9CA3AF; --sub: #6B7280;
    --ok: #16A34A; --ok-bg: #F0FDF4; --ok-br: #BBF7D0;
    --low: #D97706; --low-bg: #FFFBEB; --low-br: #FDE68A;
    --out: #DC2626; --out-bg: #FEF2F2; --out-br: #FECACA;
    --blue: #2563EB; --blue-bg: #EFF6FF; --blue-br: #BFDBFE;
  }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  .nav { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .nav-logo-mark { width: 30px; height: 30px; background: var(--text); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--sub); border: none; background: none; transition: all 0.12s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .nav-tab:hover { color: var(--text); background: var(--surface); }
  .nav-tab.active { color: var(--text); background: var(--surface); font-weight: 600; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-badge { background: var(--out-bg); color: var(--out); border: 1px solid var(--out-br); font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 99px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); display: inline-block; margin-right: 5px; }
  .sync-dot.loading { background: var(--low); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--out); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .nav-sync { font-size: 11.5px; color: var(--muted); font-family: 'DM Mono', monospace; display: flex; align-items: center; }
  .main { max-width: 1100px; margin: 0 auto; padding: 36px 32px 80px; flex: 1; }
  .page-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; }
  .page-sub { font-size: 13.5px; color: var(--sub); margin-top: 4px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; }
  .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .stat-num { font-size: 36px; font-weight: 700; letter-spacing: -0.04em; color: var(--text); line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-num.red { color: var(--out); } .stat-num.amber { color: var(--low); } .stat-num.green { color: var(--ok); }
  .stat-note { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-toolbar { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  thead th.r { text-align: right; } thead th.c { text-align: center; }
  thead th.sort { cursor: pointer; user-select: none; } thead th.sort:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 14px 16px; font-size: 13.5px; vertical-align: middle; }
  tbody td.r { text-align: right; } tbody td.c { text-align: center; }
  .td-name { font-weight: 600; font-size: 14px; }
  .td-sku { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .td-qty { font-family: 'DM Mono', monospace; font-size: 14px; }
  .deficit { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 400; color: var(--out); }
  .progress-wrap { height: 3px; background: var(--surface); border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 99px; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-family: 'DM Mono', monospace; border: 1px solid transparent; }
  .badge.ok  { background: var(--ok-bg);  color: var(--ok);  border-color: var(--ok-br);  }
  .badge.low { background: var(--low-bg); color: var(--low); border-color: var(--low-br); }
  .badge.out { background: var(--out-bg); color: var(--out); border-color: var(--out-br); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.12s; border: 1px solid var(--border2); background: var(--white); color: var(--text); }
  .btn:hover { background: var(--surface); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn.primary:hover { background: #1F2937; }
  .btn.danger { color: var(--out); border-color: var(--out-br); background: var(--out-bg); }
  .btn.danger:hover { background: #FEE2E2; }
  .btn.sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--surface); border-color: var(--border); }
  .input { width: 100%; padding: 9px 13px; border-radius: 8px; border: 1px solid var(--border2); color: var(--text); font-size: 13.5px; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--white); outline: none; transition: border-color 0.15s; }
  .input:focus { border-color: var(--text); }
  .input::placeholder { color: var(--muted); }
  .input.mono { font-family: 'DM Mono', monospace; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-wrap .input { padding-left: 34px; }
  .label { display: block; font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; letter-spacing: 0.02em; }
  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; margin-bottom: 22px; }
  .drop-zone { border: 1.5px dashed var(--border2); border-radius: 12px; padding: 48px 32px; text-align: center; cursor: pointer; transition: all 0.18s; background: var(--white); margin-bottom: 14px; }
  .drop-zone:hover, .drop-zone.over { border-color: var(--text); background: var(--surface); }
  .drop-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; }
  .drop-sub { font-size: 13px; color: var(--sub); margin-bottom: 22px; line-height: 1.6; }
  .col-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-family: 'DM Mono', monospace; font-size: 12px; padding: 3px 10px; border-radius: 5px; background: var(--surface); border: 1px solid var(--border); color: var(--sub); }
  .subtabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .subtab { padding: 10px 18px; border: none; background: none; cursor: pointer; font-size: 13.5px; font-weight: 500; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--sub); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; }
  .subtab:hover { color: var(--text); }
  .subtab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }
  .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; gap: 9px; animation: slideUp 0.2s ease; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid transparent; }
  .toast.success { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-br); }
  .toast.error   { background: var(--out-bg); color: var(--out); border-color: var(--out-br); }
  .toast.info    { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-br); }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .empty { padding: 56px 24px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .edit-input { font-family: 'DM Mono', monospace; font-size: 13px; padding: 5px 9px; border-radius: 6px; border: 1px solid var(--border2); color: var(--text); background: var(--white); width: 100%; outline: none; }
  .edit-input:focus { border-color: var(--text); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 14px; color: var(--muted); font-size: 14px; }
  @media (max-width: 640px) { .nav-inner{padding:0 16px} .main{padding:24px 16px 60px} .stat-grid{grid-template-columns:1fr 1fr} .form-grid{grid-template-columns:1fr} .page-hdr{flex-direction:column;gap:14px} }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPABASE_URL = "https://gkcnvigqptkjaoafyfna.supabase.co";
const SUPABASE_KEY = "sb_publishable_fQ4FYcVTrXF_oe6i9IK6HA_EVUqr-j3";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation",
};

const db = {
  async getAll() {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&order=name.asc`, { headers: HEADERS });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async insert(item) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory`, {
      method: "POST", headers: HEADERS,
      body: JSON.stringify({ name: item.name, barcode: item.barcode, available: item.available, minimum: item.minimum }),
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async update(id, fields) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory?id=eq.${id}`, {
      method: "PATCH", headers: HEADERS,
      body: JSON.stringify(fields),
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async remove(id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory?id=eq.${id}`, {
      method: "DELETE", headers: { ...HEADERS, "Prefer": "return=minimal" },
    });
    if (!r.ok) throw new Error(await r.text());
  },
};

const ICONS = {
  box:      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  search:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  download: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  upload:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  plus:     <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  edit:     <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
  check:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  refresh:  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
  file:     <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
};

function Toast({ msg, type }) {
  const icon = type === "success" ? ICONS.check : type === "info" ? "↻" : "!";
  return <div className={`toast ${type}`}>{icon} {msg}</div>;
}

const TABS = [
  { id: "report",    label: "Order Report" },
  { id: "inventory", label: "Inventory"    },
  { id: "add",       label: "Add / Import" },
];

function App() {
  const [tab, setTab]         = useState("report");
  const [items, setItems]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [syncErr, setSyncErr] = useState(false);
  const [toast, setToast]     = useState(null);
  const [search, setSearch]   = useState("");
  const [editId, setEditId]   = useState(null);
  const [editRow, setEditRow] = useState({});
  const [addMode, setAddMode] = useState("manual");
  const [form, setForm]       = useState({ name:"", barcode:"", available:"", minimum:"" });
  const [drag, setDrag]       = useState(false);
  const [importing, setImporting] = useState(false);
  const [sortCol, setSortCol] = useState("name");
  const [sortDir, setSortDir] = useState("asc");
  const fileRef = useRef();

  const notify = (msg, type="success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  const loadItems = useCallback(async () => {
    setSyncing(true); setSyncErr(false);
    try {
      const data = await db.getAll();
      setItems(data);
      setLastSync(new Date());
    } catch(e) {
      setSyncErr(true);
      notify("Could not connect to database.", "error");
    } finally {
      setSyncing(false); setLoading(false);
    }
  }, []);

  useEffect(() => { loadItems(); }, [loadItems]);

  // Auto-refresh every 60s
  useEffect(() => {
    const t = setInterval(loadItems, 60000);
    return () => clearInterval(t);
  }, [loadItems]);

  const addItem = async () => {
    if (!form.name.trim()) { notify("Item name is required.", "error"); return; }
    const available = parseFloat(form.available) || 0;
    const minimum   = parseFloat(form.minimum) || 0;
    const existing  = items.find(i =>
      i.name.toLowerCase() === form.name.trim().toLowerCase() ||
      (form.barcode.trim() && i.barcode === form.barcode.trim())
    );
    setSyncing(true);
    try {
      if (existing) {
        const updated = await db.update(existing.id, { available, minimum, barcode: form.barcode.trim() || existing.barcode });
        setItems(prev => prev.map(i => i.id === existing.id ? updated : i));
        notify("Item updated.");
      } else {
        const created = await db.insert({ name: form.name.trim(), barcode: form.barcode.trim(), available, minimum });
        setItems(prev => [...prev, created].sort((a,b)=>a.name.localeCompare(b.name)));
        notify("Item added.");
      }
      setForm({ name:"", barcode:"", available:"", minimum:"" });
    } catch(e) {
      notify("Failed to save. Check connection.", "error");
    } finally { setSyncing(false); }
  };

  const deleteItem = async (id) => {
    setSyncing(true);
    try {
      await db.remove(id);
      setItems(prev => prev.filter(i => i.id !== id));
      notify("Removed.");
      if (editId === id) setEditId(null);
    } catch(e) { notify("Failed to delete.", "error"); }
    finally { setSyncing(false); }
  };

  const saveEdit = async () => {
    setSyncing(true);
    try {
      const updated = await db.update(editId, {
        name:      editRow.name.trim(),
        barcode:   editRow.barcode,
        available: parseFloat(editRow.available) || 0,
        minimum:   parseFloat(editRow.minimum) || 0,
      });
      setItems(prev => prev.map(i => i.id === editId ? updated : i));
      setEditId(null); notify("Saved.");
    } catch(e) { notify("Failed to save.", "error"); }
    finally { setSyncing(false); }
  };

  const handleFile = async (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const wb   = XLSX.read(e.target.result, { type:"binary" });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:"" });
        const parsed = rows.map((r,i) => ({
          name:      String(r["Name"]||r["name"]||r["Item"]||r["item"]||"").trim(),
          barcode:   String(r["Barcode"]||r["barcode"]||r["SKU"]||r["sku"]||"").trim(),
          available: parseFloat(r["Available"]||r["available"]||r["Qty"]||r["qty"]||0)||0,
          minimum:   parseFloat(r["Minimum"]||r["minimum"]||r["Min"]||r["min"]||0)||0,
        })).filter(x=>x.name);

        if (!parsed.length) { notify("No valid rows found.", "error"); return; }

        setImporting(true);
        notify(`Importing ${parsed.length} items…`, "info");
        let added=0, updated=0;

        for (const ni of parsed) {
          const existing = items.find(ei =>
            ei.name.toLowerCase()===ni.name.toLowerCase() ||
            (ni.barcode && ei.barcode && ei.barcode===ni.barcode)
          );
          try {
            if (existing) {
              await db.update(existing.id, ni);
              updated++;
            } else {
              await db.insert(ni);
              added++;
            }
          } catch(_) {}
        }

        await loadItems();
        notify(`${added} added · ${updated} updated`);
      } catch(err) {
        notify("Could not read file.", "error");
      } finally { setImporting(false); }
    };
    reader.readAsBinaryString(file);
  };

  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([
      ["Name","Barcode","Available","Minimum"],
      ["Blueberry Syrup","SKU-001",10,20],
      ["Vanilla Extract","SKU-002",5,15],
    ]);
    ws["!cols"]=[{wch:24},{wch:12},{wch:12},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Inventory");
    XLSX.writeFile(wb,"inventory_template.xlsx");
  };

  const exportReport = () => {
    const rows=items.filter(i=>i.available<i.minimum).map(i=>({
      "Item Name":i.name,"Barcode":i.barcode,
      "Available":i.available,"Minimum Required":i.minimum,
      "Need to Order":i.minimum-i.available,
    }));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws["!cols"]=[{wch:26},{wch:14},{wch:12},{wch:18},{wch:16}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Order Report");
    XLSX.writeFile(wb,`order_report_${new Date().toLocaleDateString("en-US").replace(/\//g,"-")}.xlsx`);
  };

  const toggleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const status = (item) => item.available===0?"out":item.available<item.minimum?"low":"ok";

  const lowItems  = items.filter(i=>i.available<i.minimum)
    .sort((a,b)=>(b.minimum-b.available)-(a.minimum-a.available));
  const outItems  = items.filter(i=>i.available===0);
  const totalNeed = lowItems.reduce((s,i)=>s+(i.minimum-i.available),0);

  const filtered  = items
    .filter(i=>i.name.toLowerCase().includes(search.toLowerCase())||i.barcode.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      let va=a[sortCol],vb=b[sortCol];
      if(typeof va==="string"){va=va.toLowerCase();vb=vb.toLowerCase();}
      return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);
    });

  const fmtSync = () => {
    if (!lastSync) return "Never";
    return lastSync.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
  };

  const Arrow = ({col}) => {
    if(sortCol!==col) return <span style={{opacity:.3,marginLeft:3}}>↕</span>;
    return <span style={{marginLeft:3}}>{sortDir==="asc"?"↑":"↓"}</span>;
  };

  if (loading) return (
    <div id="app">
      <nav className="nav"><div className="nav-inner"><div className="nav-logo"><div className="nav-logo-mark">{ICONS.box}</div>StockFlow</div></div></nav>
      <div className="loading-screen">
        <div className="spinner" style={{width:24,height:24,borderWidth:3}} />
        Connecting to database…
      </div>
    </div>
  );

  return (
    <div id="app">
      {toast && <Toast {...toast} />}

      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo">
            <div className="nav-logo-mark">{ICONS.box}</div>
            StockFlow
          </div>
          <div className="nav-tabs">
            {TABS.map(t=>(
              <button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
                {t.label}
                {t.id==="report"&&lowItems.length>0&&<span className="nav-badge" style={{marginLeft:7}}>{lowItems.length}</span>}
              </button>
            ))}
          </div>
          <div className="nav-right">
            <button className="btn sm ghost" onClick={loadItems} disabled={syncing} title="Refresh">
              {syncing ? <span className="spinner"/> : ICONS.refresh}
            </button>
            <span className="nav-sync">
              <span className={`sync-dot${syncing?" loading":syncErr?" error":""}`}/>
              {syncing ? "Syncing…" : syncErr ? "Offline" : `Synced ${fmtSync()}`}
            </span>
          </div>
        </div>
      </nav>

      <div className="main">

        {/* ORDER REPORT */}
        {tab==="report" && <>
          <div className="page-hdr">
            <div>
              <div className="page-title">Order Report</div>
              <div className="page-sub">Items below minimum · live from database · refreshes every 60s</div>
            </div>
            {lowItems.length>0&&<button className="btn" onClick={exportReport}>{ICONS.download} Export to Excel</button>}
          </div>

          <div className="stat-grid">
            <div className="stat-card">
              <div className="stat-label">Items to restock</div>
              <div className={`stat-num${lowItems.length>0?" red":""}`}>{lowItems.length}</div>
              <div className="stat-note">{lowItems.length===0?"All stocked up":"Need purchasing"}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Out of stock</div>
              <div className={`stat-num${outItems.length>0?" amber":""}`}>{outItems.length}</div>
              <div className="stat-note">{outItems.length===0?"None out":"Urgent"}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total units needed</div>
              <div className="stat-num">{totalNeed}</div>
              <div className="stat-note">Across all low items</div>
            </div>
          </div>

          {lowItems.length===0 ? (
            <div className="table-card">
              <div className="empty">
                ✓ All items are fully stocked.
                {items.length===0&&<><br/><button className="btn primary" style={{marginTop:16}} onClick={()=>setTab("add")}>{ICONS.plus} Add your first items</button></>}
              </div>
            </div>
          ) : (
            <div className="table-card">
              <div className="table-scroll">
                <table>
                  <colgroup><col style={{width:"37%"}}/><col style={{width:"13%"}}/><col style={{width:"13%"}}/><col style={{width:"19%"}}/><col style={{width:"18%"}}/></colgroup>
                  <thead><tr>
                    <th>Item</th><th className="r">Available</th><th className="r">Minimum</th>
                    <th className="r" style={{color:"var(--text)"}}>Need to order</th><th className="c">Status</th>
                  </tr></thead>
                  <tbody>
                    {lowItems.map(item=>{
                      const deficit=item.minimum-item.available;
                      const pct=Math.min(100,Math.round((item.available/Math.max(item.minimum,1))*100));
                      return (
                        <tr key={item.id}>
                          <td>
                            <div className="td-name">{item.name}</div>
                            {item.barcode&&<div className="td-sku">{item.barcode}</div>}
                            <div className="progress-wrap">
                              <div className="progress-fill" style={{width:`${pct}%`,background:item.available===0?"var(--out)":pct<40?"var(--low)":"var(--ok)"}}/>
                            </div>
                          </td>
                          <td className="r"><span className="td-qty" style={{color:item.available===0?"var(--out)":"var(--low)"}}>{item.available}</span></td>
                          <td className="r"><span className="td-qty" style={{color:"var(--muted)"}}>{item.minimum}</span></td>
                          <td className="r"><span className="deficit">+{deficit}</span></td>
                          <td className="c"><span className={`badge ${item.available===0?"out":"low"}`}>{item.available===0?"Out":"Low"}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>}

        {/* INVENTORY */}
        {tab==="inventory" && <>
          <div className="page-hdr">
            <div>
              <div className="page-title">Inventory</div>
              <div className="page-sub">{items.length} items · edit quantities at end of day</div>
            </div>
          </div>
          <div className="table-card">
            <div className="table-toolbar">
              <div className="search-wrap" style={{flex:1,maxWidth:340}}>
                <span className="search-icon">{ICONS.search}</span>
                <input className="input" placeholder="Search by name or barcode…" value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <span style={{fontSize:12,color:"var(--muted)",fontFamily:"'DM Mono',monospace"}}>{filtered.length} results</span>
            </div>
            {filtered.length===0 ? (
              <div className="empty">{items.length===0?"No items yet — go to Add / Import.":"No results match your search."}</div>
            ) : (
              <div className="table-scroll">
                <table>
                  <colgroup><col style={{width:"34%"}}/><col style={{width:"15%"}}/><col style={{width:"15%"}}/><col style={{width:"13%"}}/><col style={{width:"23%"}}/></colgroup>
                  <thead><tr>
                    <th className="sort" onClick={()=>toggleSort("name")}>Item <Arrow col="name"/></th>
                    <th className="r sort" onClick={()=>toggleSort("available")}>Available <Arrow col="available"/></th>
                    <th className="r sort" onClick={()=>toggleSort("minimum")}>Minimum <Arrow col="minimum"/></th>
                    <th className="c">Status</th><th className="r">Actions</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(item=>(
                      <tr key={item.id}>
                        {editId===item.id ? <>
                          <td>
                            <input className="edit-input" value={editRow.name} onChange={e=>setEditRow({...editRow,name:e.target.value})} style={{marginBottom:5}}/>
                            <input className="edit-input" value={editRow.barcode} onChange={e=>setEditRow({...editRow,barcode:e.target.value})} placeholder="Barcode" style={{fontSize:11}}/>
                          </td>
                          <td className="r"><input className="edit-input" type="number" min="0" value={editRow.available} onChange={e=>setEditRow({...editRow,available:e.target.value})} style={{textAlign:"right"}}/></td>
                          <td className="r"><input className="edit-input" type="number" min="0" value={editRow.minimum} onChange={e=>setEditRow({...editRow,minimum:e.target.value})} style={{textAlign:"right"}}/></td>
                          <td/>
                          <td className="r">
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                              <button className="btn sm primary" onClick={saveEdit} disabled={syncing}>{syncing?<span className="spinner"/>:"Save"}</button>
                              <button className="btn sm ghost" onClick={()=>setEditId(null)}>Cancel</button>
                            </div>
                          </td>
                        </> : <>
                          <td><div className="td-name">{item.name}</div>{item.barcode&&<div className="td-sku">{item.barcode}</div>}</td>
                          <td className="r"><span className="td-qty">{item.available}</span></td>
                          <td className="r"><span className="td-qty" style={{color:"var(--muted)"}}>{item.minimum}</span></td>
                          <td className="c"><span className={`badge ${status(item)}`}>{status(item)==="ok"?"OK":status(item)==="low"?"Low":"Out"}</span></td>
                          <td className="r">
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                              <button className="btn sm ghost" onClick={()=>{setEditId(item.id);setEditRow({name:item.name,barcode:item.barcode||"",available:item.available,minimum:item.minimum});}}>
                                {ICONS.edit} Edit
                              </button>
                              <button className="btn sm danger" onClick={()=>deleteItem(item.id)}>{ICONS.trash}</button>
                            </div>
                          </td>
                        </>}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </>}

        {/* ADD / IMPORT */}
        {tab==="add" && <>
          <div className="page-hdr">
            <div><div className="page-title">Add / Import</div><div className="page-sub">Enter items manually or bulk-import via Excel</div></div>
          </div>
          <div className="subtabs">
            {[{id:"manual",label:"Manual entry"},{id:"excel",label:"Import Excel"}].map(m=>(
              <button key={m.id} className={`subtab${addMode===m.id?" active":""}`} onClick={()=>setAddMode(m.id)}>{m.label}</button>
            ))}
          </div>

          {addMode==="manual" && (
            <div className="form-card">
              <p style={{fontSize:13,color:"var(--sub)",marginBottom:22,lineHeight:1.7}}>
                If an item with the same name or barcode already exists, it will be updated — not duplicated.
              </p>
              <div className="form-grid">
                {[
                  {key:"name",     label:"Item name",          placeholder:"e.g. Blueberry Syrup",  type:"text",   req:true },
                  {key:"barcode",  label:"Barcode / SKU",      placeholder:"e.g. SKU-001",           type:"text",   req:false},
                  {key:"available",label:"Available quantity",  placeholder:"0",                     type:"number", req:false},
                  {key:"minimum",  label:"Minimum required",   placeholder:"0",                     type:"number", req:false},
                ].map(f=>(
                  <div key={f.key}>
                    <label className="label">{f.label}{f.req&&<span style={{color:"var(--out)",marginLeft:3}}>*</span>}</label>
                    <input className={`input${f.type==="number"?" mono":""}`}
                      type={f.type} placeholder={f.placeholder} min={f.type==="number"?0:undefined}
                      value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})}
                      onKeyDown={e=>{if(e.key==="Enter"&&f.key==="minimum")addItem();}}
                    />
                  </div>
                ))}
              </div>
              <button className="btn primary" onClick={addItem} disabled={syncing}>
                {syncing?<span className="spinner"/>:ICONS.plus} Add item
              </button>
            </div>
          )}

          {addMode==="excel" && <>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}
              onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}}/>
            <div className={`drop-zone${drag?" over":""}`}
              onClick={()=>!importing&&fileRef.current?.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}}>
              <div style={{fontSize:32,marginBottom:14}}>{ICONS.file}</div>
              <div className="drop-title">{importing?"Importing…":"Drop your Excel file here"}</div>
              <div className="drop-sub">
                {importing?"Please wait while items are saved to the database.":"Accepts .xlsx · .xls · .csv\nExisting items matched by name or barcode are updated, not duplicated."}
              </div>
              {!importing&&<button className="btn" onClick={e=>{e.stopPropagation();fileRef.current?.click();}}>{ICONS.upload} Choose file</button>}
              {importing&&<div className="spinner" style={{margin:"0 auto"}}/>}
            </div>
            <div className="form-card" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,marginBottom:10,letterSpacing:"0.04em",color:"var(--sub)"}}>EXPECTED COLUMNS</div>
                <div className="col-chips">
                  {["Name","Barcode","Available","Minimum"].map(c=><span key={c} className="chip">{c}</span>)}
                </div>
                <p style={{fontSize:12,color:"var(--muted)",marginTop:9}}>Barcode is optional. First row must be headers.</p>
              </div>
              <button className="btn" onClick={downloadTemplate}>{ICONS.download} Download template</button>
            </div>
          </>}
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
